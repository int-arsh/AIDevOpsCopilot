apiVersion: v1
kind: Secret
metadata:
  name: devops-copilot-secrets
  namespace: default
type: Opaque
stringData:
  GROQ_API_KEY: REPLACE_ME
  GITHUB_TOKEN: REPLACE_ME
  GITHUB_REPO: REPLACE_ME
# Recommended creation flow:
# kubectl create secret generic devops-copilot-secrets --from-literal=GROQ_API_KEY=xxx --from-literal=GITHUB_TOKEN=xxx --from-literal=GITHUB_REPO=xxx
# Do not commit real secret values to a YAML file.