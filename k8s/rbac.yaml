apiVersion: v1
kind: ServiceAccount
metadata:
  name: devops-copilot-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: devops-copilot-role
rules:
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
    verbs:
      - get
      - list
      - watch
    # Pod reads are required so the copilot can inspect workload status and collect
    # log output for troubleshooting without changing cluster state.
  - apiGroups: [""]
    resources:
      - nodes
      - events
      - namespaces
    verbs:
      - get
      - list
      - watch
    # Node, event, and namespace reads let the copilot report cluster health,
    # surface warnings, and understand where workload issues are happening.
  - apiGroups: [""]
    resources:
      - persistentvolumeclaims
      - configmaps
    verbs:
      - get
      - list
      - watch
    # PVC and ConfigMap reads help the copilot explain storage and configuration
    # related issues while remaining read-only.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devops-copilot-binding
subjects:
  - kind: ServiceAccount
    name: devops-copilot-sa
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devops-copilot-role
